<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate QR Code Meja</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
        }
        .qr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .qr-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .qr-card img {
            width: 200px;
            height: 200px;
            margin: 10px auto;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        @media print {
            .btn, h1 {
                display: none;
            }
            .qr-card {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 QR Code untuk Meja Cafe IronColol</h1>
        <div class="qr-grid" id="qrGrid"></div>
    </div>

    <script>
        const BASE_URL = window.location.origin || 'http://localhost:3000';
        
        function generateQRCodes() {
            const grid = document.getElementById('qrGrid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= 10; i++) {
                const url = `${BASE_URL}/menu.html?table=${i}`;
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
                
                const card = document.createElement('div');
                card.className = 'qr-card';
                card.innerHTML = `
                    <h3>Meja ${i}</h3>
                    <img src="${qrUrl}" alt="QR Meja ${i}">
                    <p><small>${url}</small></p>
                    <button class="btn" onclick="window.open('${qrUrl}', '_blank')">Download</button>
                `;
                grid.appendChild(card);
            }
        }
        
        generateQRCodes();
    </script>
</body>
</html>
