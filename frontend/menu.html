<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Menu - Cafe IronColol</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-mug-hot"></i>
                <span>IronColol</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Beranda</a></li>
                <li><a href="menu.html" class="nav-link active">Menu</a></li>
                <li><a href="order.html" class="nav-link">Pesan Antar</a></li>
            </ul>
            <div class="nav-icons">
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </a>
                <div class="menu-toggle">
                    <i class="fas fa-bars"></i>
                </div>
            </div>
        </div>
    </nav>

    <section class="menu-page">
        <div class="container">
            <div id="tableInfo"></div>
            <div class="menu-header">
                <h1>Our <span class="highlight">Menu</span></h1>
                <div class="category-filters">
                    <button class="filter-btn active" data-category="all">Semua</button>
                    <button class="filter-btn" data-category="kopi">☕ Kopi</button>
                    <button class="filter-btn" data-category="makanan">🍚 Makanan</button>
                    <button class="filter-btn" data-category="snack">🍿 Snack</button>
                </div>
            </div>
            <div class="menu-grid" id="menuGrid">
                <div class="text-center">Loading...</div>
            </div>
        </div>
    </section>

    <div id="toast" class="toast"></div>

    <script src="js/main.js"></script>
</body>
</html>
