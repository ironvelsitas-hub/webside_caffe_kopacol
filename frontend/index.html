<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cafe IronColol - Premium Coffee & Dining</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Scanner overlay style */
        .scanner-container {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }
        #qr-video {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }
        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .scanner-frame {
            width: 80%;
            height: 80%;
            border: 2px solid #00ff00;
            border-radius: 20px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { border-color: #00ff00; transform: scale(1); }
            50% { border-color: #ffd700; transform: scale(1.02); }
        }
        .scanner-status {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
        }
        .status-scanning { background: #e3f2fd; color: #1976d2; }
        .status-success { background: #d1fae5; color: #059669; }
        .status-error { background: #fee2e2; color: #dc2626; }
        .table-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .table-btn {
            padding: 0.8rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .table-btn:hover {
            background: #5a67d8;
            transform: scale(1.02);
        }
        @media (max-width: 768px) {
            .scanner-frame { width: 70%; height: 70%; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-mug-hot"></i>
                <span>IronColol</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link active">Beranda</a></li>
                <li><a href="menu.html" class="nav-link">Menu</a></li>
                <li><a href="order.html" class="nav-link">Pesan Antar</a></li>
                <li><a href="#about" class="nav-link">Tentang</a></li>
            </ul>
            <div class="nav-icons">
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </a>
                <div class="menu-toggle">
                    <i class="fas fa-bars"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="animate-slideDown">Welcome to <span class="highlight">IronColol</span></h1>
            <p class="animate-slideUp">Scan QR Code di meja untuk mulai memesan</p>
            <div class="hero-buttons">
                <button class="btn btn-primary" id="scanQRBtn">
                    <i class="fas fa-qrcode"></i> Scan QR Meja Sekarang
                </button>
                <a href="menu.html" class="btn btn-secondary">Lihat Menu</a>
            </div>
        </div>
        <div class="hero-wave">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
                <path fill="#ffffff" fill-opacity="1" d="M0,192L48,197.3C96,203,192,213,288,208C384,203,480,181,576,181.3C672,181,768,203,864,208C960,213,1056,203,1152,186.7C1248,171,1344,149,1392,138.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
            </svg>
        </div>
    </section>

    <!-- QR Scanner Modal -->
    <div id="qrModal" class="modal">
        <div class="modal-content" style="max-width: 500px; max-height: 90vh; overflow-y: auto;">
            <span class="close">&times;</span>
            <h2 style="text-align: center; margin-bottom: 1rem;">
                <i class="fas fa-qrcode"></i> Scan QR Code Meja
            </h2>
            
            <div class="scanner-container">
                <video id="qr-video" playsinline></video>
                <div class="scanner-overlay">
                    <div class="scanner-frame"></div>
                </div>
            </div>
            
            <div id="scannerStatus" class="scanner-status status-scanning">
                <i class="fas fa-camera"></i> Menyiapkan kamera...
            </div>
            
            <div style="margin-top: 1rem;">
                <button id="stopScanBtn" class="btn btn-secondary" style="width: 100%; margin-bottom: 0.5rem;">
                    <i class="fas fa-stop"></i> Hentikan Scan
                </button>
                <button id="manualTableBtn" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-keyboard"></i> Pilih Meja Manual
                </button>
            </div>
        </div>
    </div>

    <!-- Manual Table Modal -->
    <div id="manualTableModal" class="modal">
        <div class="modal-content" style="max-width: 350px;">
            <span class="close-manual">&times;</span>
            <h2 style="text-align: center;">
                <i class="fas fa-chair"></i> Pilih Nomor Meja
            </h2>
            <div class="table-grid">
                <button class="table-btn" data-table="1">Meja 1</button>
                <button class="table-btn" data-table="2">Meja 2</button>
                <button class="table-btn" data-table="3">Meja 3</button>
                <button class="table-btn" data-table="4">Meja 4</button>
                <button class="table-btn" data-table="5">Meja 5</button>
                <button class="table-btn" data-table="6">Meja 6</button>
                <button class="table-btn" data-table="7">Meja 7</button>
                <button class="table-btn" data-table="8">Meja 8</button>
                <button class="table-btn" data-table="9">Meja 9</button>
                <button class="table-btn" data-table="10">Meja 10</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Load QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
